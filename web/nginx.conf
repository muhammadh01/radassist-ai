server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /predict {
        proxy_pass http://radassist/predict;
        proxy_set_header Host $host;
        client_max_body_size 10m;
    }
}
